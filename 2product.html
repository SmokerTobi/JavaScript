<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Product Calculation</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #e8f5e9;
            margin: 50px auto;
            max-width: 400px;
        }

        .container {
            background: #ffffff;
            padding: 20px;
            border: 2px solid #4caf50;
            border-radius: 8px;
        }

        h2 {
            text-align: center;
            color: #2e7d32;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #333;
        }

        input {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        input:focus {
            border-color: #4caf50;
            outline: none;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #4caf50;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: #388e3c;
        }

        #result {
            margin-top: 20px;
            padding: 15px;
            background-color: #c8e6c9;
            border: 1px solid #4caf50;
            border-radius: 4px;
            display: none;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
        }

        hr {
            border: 0;
            border-top: 1px solid #4caf50;
            margin: 10px 0;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>Product Invoice</h2>
        <div class="form-group">
            <label for="customerName">Customer Name</label>
            <input type="text" id="customerName" placeholder="Enter customer name">
        </div>
        <div class="form-group">
            <label for="product">Product Name</label>
            <input type="text" id="product" placeholder="Enter product name">
        </div>
        <div class="form-group">
            <label for="price">Price</label>
            <input type="number" id="price" placeholder="Enter price" min="0">
        </div>
        <div class="form-group">
            <label for="quantity">Quantity</label>
            <input type="number" id="quantity" placeholder="Enter quantity" min="1" value="1">
        </div>
        <button onclick="calculateBill()">Calculate Bill</button>

        <div id="result">
            <div class="result-item"><span>Customer:</span> <strong id="res-customer"></strong></div>
            <div class="result-item"><span>Product:</span> <strong id="res-product"></strong></div>
            <div class="result-item"><span>Subtotal:</span> <strong id="res-subtotal"></strong></div>
            <div class="result-item"><span>GST (18%):</span> <strong id="res-gst"></strong></div>
            <hr>
            <div class="result-item"><span>Total:</span> <strong id="res-total"></strong></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
